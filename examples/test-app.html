<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etegie Bot Test</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & React DOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Date-fns -->
    <script src="https://unpkg.com/date-fns@2.30.0/index.js"></script>
    
    <!-- Lucide React Icons -->
    <script src="https://unpkg.com/lucide-react@0.294.0/dist/umd/lucide-react.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            background: #f3f4f6;
        }
        
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px;
            border-radius: 6px;
            margin: 12px 0;
        }
        
        .success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
            padding: 12px;
            border-radius: 6px;
            margin: 12px 0;
        }
        
        .loading {
            background: #fef3c7;
            border: 1px solid #fde68a;
            color: #d97706;
            padding: 12px;
            border-radius: 6px;
            margin: 12px 0;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="test-container">
            <h1>🤖 Etegie Bot Test</h1>
            <p>Testing the etegie-bot frontend components...</p>
            <div id="status" class="loading">Loading components...</div>
            <div id="test-results"></div>
        </div>
    </div>

    <script>
        // Mock the etegie-bot components for testing
        const { useState, useEffect, useRef, useCallback } = React;
        
        // Simple mock chatbot component
        function MockChatbot(props) {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([
                { id: '1', content: props.welcomeMessage || 'Hello! How can I help you today?', sender: 'bot', timestamp: new Date() }
            ]);
            const [inputMessage, setInputMessage] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            
            const sendMessage = () => {
                if (!inputMessage.trim()) return;
                
                const userMessage = {
                    id: Date.now().toString(),
                    content: inputMessage,
                    sender: 'user',
                    timestamp: new Date()
                };
                
                setMessages(prev => [...prev, userMessage]);
                setInputMessage('');
                setIsTyping(true);
                
                // Simulate bot response
                setTimeout(() => {
                    const botResponse = {
                        id: (Date.now() + 1).toString(),
                        content: `I received your message: "${inputMessage}". This is a test response from the mock bot.`,
                        sender: 'bot',
                        timestamp: new Date()
                    };
                    setMessages(prev => [...prev, botResponse]);
                    setIsTyping(false);
                }, 1000);
            };
            
            if (!isOpen) {
                return React.createElement('div', {
                    className: 'fixed bottom-4 right-4 z-50',
                    children: React.createElement('button', {
                        onClick: () => setIsOpen(true),
                        className: 'bg-blue-500 hover:bg-blue-600 text-white rounded-full p-4 shadow-lg transition-all duration-200 hover:scale-105',
                        children: '💬'
                    })
                });
            }
            
            return React.createElement('div', {
                className: 'fixed bottom-4 right-4 z-50 w-96 h-[500px] bg-white rounded-lg shadow-xl border border-gray-200 flex flex-col',
                children: [
                    // Header
                    React.createElement('div', {
                        key: 'header',
                        className: 'bg-blue-500 text-white p-4 rounded-t-lg flex justify-between items-center',
                        children: [
                            React.createElement('h3', { key: 'title', className: 'font-semibold', children: props.botName || 'Eegie Assistant' }),
                            React.createElement('button', {
                                key: 'close',
                                onClick: () => setIsOpen(false),
                                className: 'text-white hover:bg-blue-600 rounded p-1',
                                children: '✕'
                            })
                        ]
                    }),
                    
                    // Messages
                    React.createElement('div', {
                        key: 'messages',
                        className: 'flex-1 overflow-y-auto p-4 space-y-3',
                        children: messages.map(msg => 
                            React.createElement('div', {
                                key: msg.id,
                                className: `flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`,
                                children: React.createElement('div', {
                                    className: `max-w-[70%] p-3 rounded-lg ${
                                        msg.sender === 'user' 
                                            ? 'bg-blue-500 text-white' 
                                            : 'bg-gray-100 text-gray-800'
                                    }`,
                                    children: msg.content
                                })
                            })
                        )
                    }),
                    
                    // Typing indicator
                    isTyping && React.createElement('div', {
                        key: 'typing',
                        className: 'px-4 pb-2',
                        children: React.createElement('div', {
                            className: 'text-gray-500 text-sm italic',
                            children: 'Bot is typing...'
                        })
                    }),
                    
                    // Input
                    React.createElement('div', {
                        key: 'input',
                        className: 'p-4 border-t border-gray-200',
                        children: React.createElement('div', {
                            className: 'flex gap-2',
                            children: [
                                React.createElement('input', {
                                    key: 'input-field',
                                    type: 'text',
                                    value: inputMessage,
                                    onChange: (e) => setInputMessage(e.target.value),
                                    onKeyPress: (e) => e.key === 'Enter' && sendMessage(),
                                    placeholder: 'Type your message...',
                                    className: 'flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500'
                                }),
                                React.createElement('button', {
                                    key: 'send-btn',
                                    onClick: sendMessage,
                                    disabled: !inputMessage.trim(),
                                    className: 'bg-blue-500 hover:bg-blue-600 disabled:bg-gray-300 text-white px-4 py-2 rounded-lg transition-colors',
                                    children: 'Send'
                                })
                            ]
                        })
                    })
                ]
            });
        }
        
        // Test function
        function runTests() {
            const statusEl = document.getElementById('status');
            const resultsEl = document.getElementById('test-results');
            
            try {
                // Test 1: Component rendering
                const testApp = React.createElement(MockChatbot, {
                    apiUrl: '/api/chat',
                    companyId: 'test-company',
                    botName: 'Test Bot',
                    welcomeMessage: 'Hello from test bot!'
                });
                
                ReactDOM.render(testApp, document.getElementById('root'));
                
                statusEl.className = 'success';
                statusEl.textContent = '✅ Mock chatbot component loaded successfully!';
                
                resultsEl.innerHTML = `
                    <h2>Test Results:</h2>
                    <div class="success">
                        <strong>✅ Component Structure:</strong> The chatbot component structure is working properly.
                    </div>
                    <div class="success">
                        <strong>✅ React Integration:</strong> React hooks and state management are functional.
                    </div>
                    <div class="success">
                        <strong>✅ UI Rendering:</strong> Tailwind CSS styling is working correctly.
                    </div>
                    <div class="loading">
                        <strong>⚠️ Next Steps:</strong> The actual etegie-bot components need proper dependency resolution.
                    </div>
                    <h3>Issues to Fix:</h3>
                    <ul>
                        <li><strong>Dependency Resolution:</strong> Components need proper module bundling</li>
                        <li><strong>CSS Compilation:</strong> Tailwind styles need to be compiled into the package</li>
                        <li><strong>Icon Integration:</strong> Lucide-react icons need proper import handling</li>
                        <li><strong>API Integration:</strong> Mock API responses need to be replaced with real backend calls</li>
                    </ul>
                `;
                
            } catch (error) {
                statusEl.className = 'error';
                statusEl.textContent = '❌ Error loading components';
                resultsEl.innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> ${error.message}
                    </div>
                `;
                console.error('Test error:', error);
            }
        }
        
        // Run tests when page loads
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
